        <style>
            
          .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Adjust the height as needed */
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease-out;
            }

            .loader {
            --dot: #fff;
            --duration: 3s;
            width: 44px;
            height: 44px;
            position: relative;
            }

            .loader:before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            position: absolute;
            display: block;
            background: var(--dot);
            top: 37px;
            left: 19px;
            transform: translate(-18px, -18px);
            animation: dotRect var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
            }

            .loader svg {
            display: block;
            width: 100%;
            height: 100%;
            }

            .loader svg rect, .loader svg polygon, .loader svg circle {
            fill: none;
            stroke: var(--path);
            stroke-width: 10px;
            stroke-linejoin: round;
            stroke-linecap: round;
            }

            .loader svg polygon {
            stroke-dasharray: 145 76 145 76;
            stroke-dashoffset: 0;
            animation: pathTriangle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
            stroke: #ffb741; /* Triangle color */
            }

            .loader svg rect {
            stroke-dasharray: 192 64 192 64;
            stroke-dashoffset: 0;
            animation: pathRect 3s cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
            stroke: #ff3e75; /* Rectangle color */
            }

            .loader svg circle {
            stroke-dasharray: 150 50 150 50;
            stroke-dashoffset: 75;
            animation: pathCircle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
            stroke: #0099df; /* Circle color */
            }

            .loader.triangle {
            width: 48px;
            }

            .loader.triangle:before {
            left: 21px;
            transform: translate(-10px, -18px);
            animation: dotTriangle var(--duration) cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
            }

            @keyframes pathTriangle {
            33% {
                stroke-dashoffset: 74;
            }

            66% {
                stroke-dashoffset: 147;
            }

            100% {
                stroke-dashoffset: 221;
            }
            }

            @keyframes dotTriangle {
            33% {
                transform: translate(0, 0);
            }

            66% {
                transform: translate(10px, -18px);
            }

            100% {
                transform: translate(-10px, -18px);
            }
            }

            @keyframes pathRect {
            25% {
                stroke-dashoffset: 64;
            }

            50% {
                stroke-dashoffset: 128;
            }

            75% {
                stroke-dashoffset: 192;
            }

            100% {
                stroke-dashoffset: 256;
            }
            }

            @keyframes dotRect {
            25% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(18px, -18px);
            }

            75% {
                transform: translate(0, -36px);
            }

            100% {
                transform: translate(-18px, -18px);
            }
            }

            @keyframes pathCircle {
            25% {
                stroke-dashoffset: 125;
            }

            50% {
                stroke-dashoffset: 175;
            }

            75% {
                stroke-dashoffset: 225;
            }

            100% {
                stroke-dashoffset: 275;
            }
            }

            .loader {
            display: inline-block;
            margin: 0 16px;
            }


          /*

          TemplateMo 590 topic listing

          https://templatemo.com/tm-590-topic-listing

          */

          /*---------------------------------------
            CUSTOM PROPERTIES ( VARIABLES )             
          -----------------------------------------*/
          :root {
            --white-color:                  #ffffff;
            --primary-color:                #13547a;
            --secondary-color:              #80d0c7;
            --section-bg-color:             #f0f8ff;
            --custom-btn-bg-color:          #80d0c7;
            --custom-btn-bg-hover-color:    #13547a;
            --dark-color:                   #000000;
            --p-color:                      #717275;
            --border-color:                 #7fffd4;
            --link-hover-color:             #13547a;

            --body-font-family:             'Open Sans', sans-serif;
            --title-font-family:            'Montserrat', sans-serif;

            --h1-font-size:                 58px;
            --h2-font-size:                 46px;
            --h3-font-size:                 32px;
            --h4-font-size:                 28px;
            --h5-font-size:                 24px;
            --h6-font-size:                 22px;
            --p-font-size:                  20px;
            --menu-font-size:               14px;
            --btn-font-size:                18px;
            --copyright-font-size:          16px;

            --border-radius-large:          100px;
            --border-radius-medium:         20px;
            --border-radius-small:          10px;

            --font-weight-normal:           400;
            --font-weight-medium:           500;
            --font-weight-semibold:         600;
            --font-weight-bold:             700;
          }

          body {
            background-color: var(--white-color);
            font-family: var(--body-font-family); 
            
          }


          /*---------------------------------------
            TYPOGRAPHY               
          -----------------------------------------*/

          h2,
          h3,
          h4,
          h5,
          h6 {
            color: var(--dark-color);
          }

          h1,
          h2,
          h3,
          h4,
          h5,
          h6 {
            font-family: var(--title-font-family); 
            font-weight: var(--font-weight-semibold);
          }

          h1 {
            font-size: var(--h1-font-size);
            font-weight: var(--font-weight-bold);
          }

          h2 {
            font-size: var(--h2-font-size);
            font-weight: var(--font-weight-bold);
          }

          h3 {
            font-size: var(--h3-font-size);
          }

          h4 {
            font-size: var(--h4-font-size);
          }

          h5 {
            font-size: var(--h5-font-size);
          }

          h6 {
            color: var(--primary-color);
            font-size: var(--h6-font-size);
          }

          p {
            color: var(--p-color);
            font-size: var(--p-font-size);
            font-weight: var(--font-weight-normal);
          }

          ul li {
            color: var(--p-color);
            font-size: var(--p-font-size);
            font-weight: var(--font-weight-normal);
          }

          a, 
          button {
            touch-action: manipulation;
            transition: all 0.3s;
          }

          a {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
          }

          a:hover {
            color: var(--link-hover-color);
          }

          b,
          strong {
            font-weight: var(--font-weight-bold);
          }


          /*---------------------------------------
            SECTION               
          -----------------------------------------*/
          .section-padding {
            padding-top: 100px;
            padding-bottom: 100px;
          }

          .section-bg {
            background-color: var(--section-bg-color);
          }

          .section-overlay {
            background-image: linear-gradient(15deg, #13547a 0%, #80d0c7 100%);
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            width: 100%;
            height: 100%;
            opacity: 0.85;
          }

          .section-overlay + .container {
            position: relative;
          }

          .tab-content {
            background-color: var(--white-color);
            border-radius: var(--border-radius-medium);
          }

          .nav-tabs {
            border-bottom: 1px solid #ecf3f2;
            margin-bottom: 40px;
            justify-content: center;
          }

          .nav-tabs .nav-link {
            border-radius: 0;
            border-top: 0;
            border-right: 0;
            border-left: 0;
            color: var(--p-color);
            font-family: var(--title-font-family);
            font-size: var(--btn-font-size);
            font-weight: var(--font-weight-medium);
            padding: 15px 25px;
            transition: all 0.3s;
          }

          .nav-tabs .nav-link:first-child {
            margin-right: 20px;
          }

          .nav-tabs .nav-item.show .nav-link, 
          .nav-tabs .nav-link.active,
          .nav-tabs .nav-link:focus, 
          .nav-tabs .nav-link:hover {
            border-bottom-color: var(--primary-color);
            color: var(--primary-color);
          }


          /*---------------------------------------
            CUSTOM ICON COLOR               
          -----------------------------------------*/
          .custom-icon {
            color: var(--secondary-color);
          }


          /*---------------------------------------
            CUSTOM BUTTON               
          -----------------------------------------*/
          .custom-btn {
            background: var(--custom-btn-bg-color);
            border: 2px solid transparent;
            border-radius: var(--border-radius-large);
            color: var(--white-color);
            font-size: var(--btn-font-size);
            font-weight: var(--font-weight-semibold);
            line-height: normal;
            transition: all 0.3s;
            padding: 10px 20px;
          }

          .custom-btn:hover {
            background: var(--custom-btn-bg-hover-color);
            color: var(--white-color);
          }

          .custom-border-btn {
            background: transparent;
            border: 2px solid var(--custom-btn-bg-color);
            color: var(--custom-btn-bg-color);
          }

          .custom-border-btn:hover {
            background: var(--custom-btn-bg-color);
            border-color: transparent;
            color: var(--white-color);
          }

          .custom-btn-bg-white {
            border-color: var(--white-color);
            color: var(--white-color);
          }


          /*---------------------------------------
            SITE HEADER              
          -----------------------------------------*/
          .site-header {
            background-image: linear-gradient(15deg, #13547a 0%, #80d0c7 100%);
            padding-top: 150px;
            padding-bottom: 80px;
          }

          .site-header .container {
            height: 100%;
          }

          .breadcrumb-item+.breadcrumb-item::before,
          .breadcrumb-item a:hover,
          .breadcrumb-item.active {
            color: var(--white-color);
          }

          .site-header .custom-icon {
            color: var(--white-color);
            font-size: var(--h4-font-size);
          }

          .site-header .custom-icon:hover {
            color: var(--secondary-color);
          }


          /*---------------------------------------
            NAVIGATION              
          -----------------------------------------*/
          .sticky-wrapper {
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
          }

          .sticky-wrapper.is-sticky .navbar {
            background-color: var(--secondary-color);
          }

          .navbar {
            background: transparent;
            border-bottom: 1px solid rgba(128, 208, 199, 0.35);
            z-index: 9;
          }

          .navbar-brand,
          .navbar-brand:hover {
            font-size: var(--h3-font-size);
            font-weight: var(--font-weight-bold);
            display: block;

          }

          .navbar-brand span {
            font-family: 20px;
          }

          .navbar-expand-lg .navbar-nav .nav-link {
            border-radius: var(--border-radius-large);
            margin: 10px;
            padding: 10px;
          }

          .navbar-nav .nav-link {
            display: inline-block;
            color: var(--white-color);
            font-family: var(--title-font-family); 
            font-size: var(--menu-font-size);
            font-weight: var(--font-weight-medium);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            padding-top: 15px;
            padding-bottom: 15px;
          }

          .navbar-nav .nav-link.active, 
          .navbar-nav .nav-link:hover {
            color: var(--primary-color);
          }

          .navbar .dropdown-menu {
            background: var(--white-color);
            box-shadow: 0 1rem 3rem rgba(0,0,0,.175);
            border: 0;
            display: inherit;
            opacity: 0;
            min-width: 9rem;
            margin-top: 20px;
            padding: 13px 0 10px 0;
            transition: all 0.3s;
            pointer-events: none;
          }

          .navbar .dropdown-menu::before {
            content: "";
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 15px solid var(--white-color);
            position: absolute;
            top: -10px;
            left: 10px;
          }

          .navbar .dropdown-item {
            display: inline-block;
            color: var(--p-bg-color);
            font-family: var(--title-font-family); 
            font-size: var(--menu-font-size);
            font-weight: var(--font-weight-medium);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
          }

          .navbar .dropdown-item.active, 
          .navbar .dropdown-item:active,
          .navbar .dropdown-item:focus, 
          .navbar .dropdown-item:hover {
            background: transparent;
            color: var(--primary-color);
          }

          .navbar .dropdown-toggle::after {
            content: "\f282";
            display: inline-block;
            font-family: bootstrap-icons !important;
            font-size: var(--copyright-font-size);
            font-style: normal;
            font-weight: normal !important;
            font-variant: normal;
            text-transform: none;
            line-height: 1;
            vertical-align: -.125em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            left: 2px;
            border: 0;
          }

          @media screen and (min-width: 992px) {
            .navbar .dropdown:hover .dropdown-menu {
              opacity: 1;
              margin-top: 0;
              pointer-events: auto;
            }
          }

          .navbar-icon {
            background: var(--white-color);
            border-radius: var(--border-radius-large);
            display: inline-block;
            font-size: var(--h5-font-size);
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            transition: all 0.3s ease;
          }

          .navbar-icon:hover {
            background: var(--primary-color);
            color: var(--white-color);
          }

          .navbar-toggler {
            border: 0;
            padding: 0;
            cursor: pointer;
            margin: 0;
            width: 30px;
            height: 35px;
            outline: none;
          }

          .navbar-toggler:focus {
            outline: none;
            box-shadow: none;
          }

          .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon {
            background: transparent;
          }

          .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon:before,
          .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon:after {
            transition: top 300ms 50ms ease, -webkit-transform 300ms 350ms ease;
            transition: top 300ms 50ms ease, transform 300ms 350ms ease;
            transition: top 300ms 50ms ease, transform 300ms 350ms ease, -webkit-transform 300ms 350ms ease;
            top: 0;
          }

          .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon:before {
            transform: rotate(45deg);
          }

          .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon:after {
            transform: rotate(-45deg);
          }

          .navbar-toggler .navbar-toggler-icon {
            background: var(--white-color);
            transition: background 10ms 300ms ease;
            display: block;
            width: 30px;
            height: 2px;
            position: relative;
          }

          .navbar-toggler .navbar-toggler-icon:before,
          .navbar-toggler .navbar-toggler-icon:after {
            transition: top 300ms 350ms ease, -webkit-transform 300ms 50ms ease;
            transition: top 300ms 350ms ease, transform 300ms 50ms ease;
            transition: top 300ms 350ms ease, transform 300ms 50ms ease, -webkit-transform 300ms 50ms ease;
            position: absolute;
            right: 0;
            left: 0;
            background: var(--white-color);
            width: 30px;
            height: 2px;
            content: '';
          }

          .navbar-toggler .navbar-toggler-icon::before {
            top: -8px;
          }

          .navbar-toggler .navbar-toggler-icon::after {
            top: 8px;
          }


          /*---------------------------------------
            HERO        
          -----------------------------------------*/
          .hero-section {
            background-image: linear-gradient(15deg, #13547a 0%, #80d0c7 100%);
            position: relative;
            overflow: hidden;
            padding-top: 150px;
            padding-bottom: 150px;
          }

          .hero-section .input-group {
            background-color: var(--white-color);
            border-radius: var(--border-radius-large);
            padding: 10px 15px;
          }

          .hero-section .input-group-text {
            background-color: transparent;
            border: 0;
          }

          .hero-section input[type="search"] {
            border: 0;
            box-shadow: none;
            margin-bottom: 0;
            padding-left: 0;
          }

          .hero-section button[type="submit"] {
            background-color: var(--primary-color);
            border: 0;
            border-radius: var(--border-radius-large) !important;
            color: var(--white-color);
            max-width: 150px;
          }


          /*---------------------------------------
            TOPICS              
          -----------------------------------------*/
          .featured-section {
            background-color: var(--secondary-color);
            border-radius: 0 0 100px 100px;
            padding-bottom: 100px;
          }

          .featured-section .row {
            position: relative;
            bottom: 100px;
            margin-bottom: -100px;
          }

          .custom-block {
            border-radius: var(--border-radius-medium);
            position: relative;
            overflow: hidden;
            padding: 30px;
            transition: all 0.3s ease;
            height: 100%;
          }

          .custom-block:hover {
            background-color: var(--secondary-color);
            transform: translateY(-3px);
          }

          .custom-block > a {
            width: 100%;
          }

          .custom-block-image {
            display: block;
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-top: 35px;
          }

          .custom-block .rounded-pill {
            border-radius: 5px !important;
            display: flex;
            justify-content: center;
            text-align: center;
            width: 30px;
            height: 30px;
            line-height: 20px;
          }

          .custom-block-overlay {
            height: 100%;
            min-height: 350px;
            padding: 0;
          }

          .custom-block-overlay > a {
            height: 100%;
          }

          .custom-block-overlay .custom-block-image {
            border-radius: var(--border-radius-medium);
            display: block;
            height: 100%;
            margin-top: 0;
          }

          .custom-block-overlay-text {
            position: absolute;
            z-index: 2;
            top: 0;
            right: 0;
            left: 0;
            padding: 30px;
          }

          .social-share {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            z-index: 2;
            padding: 20px 35px;
          }

          .social-share .bi-bookmark {
            color: var(--white-color);
            font-size: var(--h5-font-size);
          }

          .social-share .bi-bookmark:hover {
            color: var(--secondary-color);
          }

          .bg-design {
            background-color: #00B0FF;
          }

          .bg-graphic {
            background-color: #00BFA6;
          }

          .bg-advertising {
            background-color: #F50057;
          }

          .bg-finance {
            background-color: #536DFE;
          }

          .bg-music {
            background-color: #F9A826;
          }

          .bg-education {
            background-color: #00BFA6;
          }


          /*---------------------------------------
            TOPICS               
          -----------------------------------------*/
          .topics-detail-block {
            border-radius: var(--border-radius-medium);
            position: relative;
            overflow: hidden;
          }

          .topics-detail-block-image {
            display: block;
            border-radius: var(--border-radius-medium);
          }

          blockquote {
            background-color: var(--section-bg-color);
            border-radius: var(--border-radius-small);
            font-family: var(--title-font-family);
            font-size: var(--h4-font-size);
            font-weight: var(--font-weight-bold);
            display: inline-block;
            text-align: center;
            margin: 30px;
            padding: 40px;
          }

          .topics-listing-page .site-header {
            padding-bottom: 65px;
          }

          .custom-block-topics-listing-info {
            margin: 30px 20px 20px 30px;
          }

          .custom-block-topics-listing {
            height: inherit;
          }

          .custom-block-topics-listing .custom-block-image {
            width: 200px;
          }


          /*---------------------------------------
            PAGINATION              
          -----------------------------------------*/
          .pagination {
            margin-top: 40px;
          }

          .page-link {
            border: 0;
            border-radius: var(--border-radius-small);
            color: var(--p-color);
            font-family: var(--title-font-family);
            margin: 0 5px;
            padding: 10px 20px;
          }

          .page-link:hover,
          .page-item:first-child .page-link:hover,
          .page-item:last-child .page-link:hover {
            background-color: var(--secondary-color);
            color: var(--white-color);
          }

          .page-item:first-child .page-link {
            margin-right: 10px;
          }

          .page-item:first-child .page-link,
          .page-item:last-child .page-link {
            background-color: var(--section-bg-color);
            border-radius: var(--border-radius-small);
          }

          .active>.page-link, .page-link.active {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
          }


          /*---------------------------------------
            TIMELINE              
          -----------------------------------------*/
          .timeline-section {
            background-image: url('../images/colleagues-working-cozy-office-medium-shot.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            position: relative;
          }

          .timeline-container .vertical-scrollable-timeline {
            list-style-type: none;
            position: relative;
            padding-left: 0;
          }

          .timeline-container .vertical-scrollable-timeline .list-progress {
            width: 8px;
            height: 87%;
            background-color: var(--primary-color);
            position: absolute;
            left: 52px;
            top: 0;
            overflow: hidden;
          }

          .timeline-container .vertical-scrollable-timeline .list-progress .inner {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 100%;
            background-color: var(--secondary-color);
            width: 100%;
          }

          .timeline-container .vertical-scrollable-timeline li {
            position: relative;
            padding: 20px 0px 65px 145px;
          }

          .timeline-container .vertical-scrollable-timeline li:last-child {
            padding-bottom: 0;
          }

          .timeline-container .vertical-scrollable-timeline li p {
            line-height: 40px;
          }

          .timeline-container .vertical-scrollable-timeline li p:last-child {
            margin-bottom: 0;
          }

          .timeline-container .vertical-scrollable-timeline li .icon-holder {
            position: absolute;
            left: 0;

      <!-- JAVASCRIPT FILES -->

      <script src="js/bootstrap.bundle.min.js"></script>
      <script src="js/jquery.sticky.js"></script>
      <script src="js/click-scroll.js"></script>
      <script src="js/custom.js"></script>

      <script>
          document.addEventListener("DOMContentLoaded", function () {
              setToggleText("Admin"); // Set "Admin" as default role on page load
          });

          function setToggleText(role) {
              const allTabs = ["design-tab", "marketing-tab", "finance-tab", "music-tab", "education-tab"];
              const allTabPanes = ["design-tab-pane", "marketing-tab-pane", "finance-tab-pane", "music-tab-pane", "education-tab-pane"];

              // Define role-based visibility rules
              const tabRules = {
                  "Admin": ["design-tab", "marketing-tab"],
                  "Company": ["finance-tab", "music-tab"],
                  "Student": ["education-tab"]
              };

              let visibleTabs = tabRules[role] || [];

              // Highlight the selected toggle button
              document.querySelectorAll(".toggle-selection .btn").forEach(button => {
                  if (button.innerText === role) {
                      button.classList.add("active"); // Bootstrap active styling
                  } else {
                      button.classList.remove("active");
                  }
              });

              // Reset and hide all tabs
              allTabs.forEach(tab => {
                  const tabElement = document.getElementById(tab);
                  if (tabElement) {
                      tabElement.style.display = visibleTabs.includes(tab) ? "block" : "none";
                      tabElement.classList.remove("active");
                  }
              });

              // Hide all tab panes
              allTabPanes.forEach(pane => {
                  const paneElement = document.getElementById(pane);
                  if (paneElement) {
                      paneElement.classList.remove("active", "show");
                  }
              });

              // Ensure the first available tab for the selected role is active
              if (visibleTabs.length > 0) {
                  const firstTab = document.getElementById(visibleTabs[0]);
                  const firstPane = document.getElementById(`${visibleTabs[0]}-pane`);

                  if (firstTab) {
                      firstTab.classList.add("active"); // Ensure UI reflects selection
                      firstTab.click(); // Bootstrap tab activation
                  }

                  if (firstPane) {
                      firstPane.classList.add("active", "show"); // Show content
                  }
              }
          }
      </script>
